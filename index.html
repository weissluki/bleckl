<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vinschger Bleckl</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#851414">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --paper-color: #f7f5ee;
            --ink-color: #1e293b;
            --grid-color: #e2e8f0;
            --accent-color: #851414;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #d1d5db;
            color: var(--ink-color);
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
            box-sizing: border-box;
            user-select: none;
            touch-action: manipulation;
        }

        .bleckl {
            width: 100%;
            max-width: 650px;
            height: 100%;
            max-height: 100vh;
            max-height: 100dvh;
            background-color: var(--paper-color);
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 20px 20px;
            border-top: 15px solid var(--accent-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            box-sizing: border-box;
            position: relative;
        }

        @media (display-mode: standalone) {
            .bleckl { border-top: none; }
        }

        h1 {
            font-size: 2.2rem;
            text-transform: uppercase;
            color: var(--accent-color);
            margin: 0 0 40px 0;
            letter-spacing: 2px;
            text-align: center;
            font-weight: bold;
        }

        .menu-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 320px;
        }

        .menu-btn {
            display: block;
            text-align: center;
            background: #fff;
            border: 1px solid #cbd5e1;
            padding: 14px 20px;
            color: var(--ink-color);
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 4px;
            box-shadow: 3px 3px 0px rgba(0,0,0,0.05);
            transition: all 0.1s ease;
        }

        .menu-btn:active {
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0px rgba(0,0,0,0.05);
            background: #f8fafc;
        }

        /* 1:1 Angleichung an das Spiel für exakt gleiche Höhe */
        .branding-footer {
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 6px; 
            padding: 10px 0; 
            padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px)); 
            opacity: 0.55; 
            font-size: 0.68rem; 
            letter-spacing: 0.03em; 
            color: var(--ink-color);
            position: absolute;
            bottom: 4px; 
            width: 100%;
            z-index: 10;
            pointer-events: none; 
        }
    </style>
</head>
<body>

    <div class="bleckl">
        <h1>Vinschger Bleckl</h1>

        <div class="menu-list">
            <a href="schlangateassen/index.html" class="menu-btn">Schlångate Assn</a>
            <a href="sackn/index.html" class="menu-btn">Såckn</a>
        </div>

        <div class="branding-footer">
            <svg viewBox="0 0 24 24" style="width: 10.5px; height: 10.5px; fill: none; stroke: currentColor; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round;">
                <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
            </svg>
            <span>luki.weiss</span>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('Service Worker registriert.'))
                .catch(err => console.warn('Service Worker Registrierung fehlgeschlagen:', err));
        }
    </script>
</body>
</html>
