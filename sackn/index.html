<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Såckn</title>
    
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#851414">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --paper-color: #f7f5ee; 
            --ink-color: #1e293b;   
            --grid-color: #e2e8f0;  
            --accent-color: #851414;
            --disabled-color: #a18262;
        }

        body {
            font-family: 'Courier New', Courier, monospace; 
            background-color: #d1d5db;
            color: var(--ink-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; 
            height: 100vh;
            height: 100dvh; 
            width: 100vw;
            overflow: hidden; 
            box-sizing: border-box;
            user-select: none;
            touch-action: manipulation; 
        }

        .bleckl {
            position: relative;
            width: 100%;
            max-width: 650px; 
            height: 100%;
            max-height: 100vh;
            max-height: 100dvh; 
            background-color: var(--paper-color);
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 20px 20px;
            border-top: 15px solid var(--accent-color); 
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-sizing: border-box;
        }

        @media (display-mode: standalone) {
            .bleckl { border-top: none; }
        }

        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px;
            border-bottom: 2px solid #cbd5e1;
            background: rgba(247, 245, 238, 0.9);
            position: relative;
            z-index: 10;
            flex-shrink: 0; 
            box-sizing: border-box;
            width: 100%;
        }

        .header-top {
            display: flex;
            width: 100%;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        .header-title-container {
            font-weight: bold;
            z-index: 11;
        }

        .menu-link { 
            font-size: 1.1rem; 
            text-transform: uppercase; 
            color: #64748b; 
            text-decoration: none;
            font-weight: bold;
            transition: color 0.15s ease;
        }
        .menu-link:hover {
            color: var(--ink-color);
        }

        .setup-row {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            align-items: center;
            font-weight: bold;
            font-size: 0.9rem;
            color: #64748b;
            flex-wrap: nowrap;
            width: auto;
        }

        .count-btn {
            font-size: 0.85rem;
            font-weight: bold;
            border: 1px solid #cbd5e1;
            background: #fff;
            padding: 4px 10px;
            border-radius: 3px;
            cursor: pointer;
            font-family: inherit;
            flex-shrink: 0;
        }
        .count-btn.active {
            background: var(--accent-color);
            color: #fff;
            border-color: var(--accent-color);
        }

        .action-btn {
            font-size: 0.8rem;
            color: #64748b;
            cursor: pointer;
            border: 1px solid #cbd5e1;
            padding: 4px 8px;
            border-radius: 3px;
            background: #fff;
            z-index: 15;
            flex-shrink: 0;
        }
        .action-btn.disabled { opacity: 0.4; pointer-events: none; }

        .content-area {
            flex-grow: 1;
            width: 100%;
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            grid-auto-rows: 1fr; 
            padding: 10px;
            box-sizing: border-box;
            overflow: hidden; 
        }

        .setup-screen {
            flex-grow: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; 
            padding: 20px 20px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .setup-screen h2 {
            font-size: 1.1rem;
            text-transform: uppercase;
            color: var(--accent-color);
            margin: 5px 0 15px 0;
            letter-spacing: 1px;
        }

        .name-inputs-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
            max-width: 280px;
            margin-bottom: 15px;
        }

        .setup-input-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #fff;
            border: 1px solid #cbd5e1;
            padding: 6px 12px;
            border-radius: 4px;
        }

        .setup-input-wrapper span {
            font-size: 0.95rem;
            color: #94a3b8;
            font-weight: bold;
            min-width: 12px;
            text-align: center;
        }

        .setup-name-input {
            border: none;
            outline: none;
            font-family: inherit;
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--ink-color);
            width: 100%;
            background: transparent;
        }
        .setup-name-input::placeholder {
            color: #cbd5e1;
            font-weight: normal;
        }

        .btn-start-game {
            background: var(--ink-color);
            color: var(--paper-color);
            border: none;
            padding: 10px 24px;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
            box-shadow: 3px 3px 0px rgba(0,0,0,0.15);
        }

        .player-row {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            box-sizing: border-box;
            padding: 4px;
        }

        .content-area[data-players="5"] .player-row:nth-child(3) { grid-row: 3; grid-column: 1; }
        .content-area[data-players="5"] .player-row:nth-child(4) { grid-row: 3; grid-column: 2; }
        .content-area[data-players="5"] .player-row:nth-child(5) {
            grid-row: 2;
            grid-column: 1 / span 2;
            justify-self: center;
            width: 50%;
        }
        
        .player-row.finished { opacity: 0.25; }

        .visual-container {
            position: relative;
            width: 160px; 
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .player-name-display {
            position: absolute;
            font-size: 1.5rem;
            font-weight: bold;
            color: #cbd5e1; 
            text-align: center;
            width: 180px; 
            z-index: 1;
            pointer-events: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .visual-box {
            width: 120px;
            height: 100%;
            z-index: 2; 
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .controls-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            width: 100%;
            z-index: 3;
        }

        .sack-container {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            min-height: 26px;
            align-items: center;
            justify-content: center;
        }

        .sack-icon {
            width: 24px;  
            height: 24px;
            cursor: pointer;
            fill: none;
            stroke: var(--ink-color);
            stroke-width: 1.8;
        }
        .sack-icon.crossed { cursor: default; }

        .btn-add-sack {
            font-size: 0.7rem;
            padding: 2px 6px;
            border: 1px dashed #64748b;
            background: transparent;
            border-radius: 3px;
            cursor: pointer;
            font-family: inherit;
            color: #64748b;
        }

        .rank-badge {
            position: absolute;
            right: 10px;
            top: 35%;
            font-size: 1rem;
            font-weight: bold;
            color: var(--accent-color);
            border: 2px solid var(--accent-color);
            padding: 2px 4px;
            transform: rotate(12deg);
            background: var(--paper-color);
            z-index: 4;
        }

        /* Komplett identische Footer-Ausrichtung wie bei den anderen Menüs */
        .branding-footer {
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 6px; 
            padding: 10px 0; 
            padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px)); 
            opacity: 0.55; 
            font-size: 0.68rem; 
            letter-spacing: 0.03em; 
            color: var(--ink-color);
            position: absolute;
            bottom: 4px; 
            width: 100%;
            z-index: 10;
            pointer-events: none; 
        }

        @media (max-height: 500px) and (orientation: landscape) {
            .bleckl { max-width: 100%; }
            header { padding: 6px 12px; }
            .setup-row { margin-top: 4px; }

            .content-area {
                display: flex !important;
                flex-direction: row !important;
                justify-content: space-around !important;
                align-items: center !important;
                padding: 5px !important;
            }

            .content-area[data-players="5"] .player-row:nth-child(3),
            .content-area[data-players="5"] .player-row:nth-child(4),
            .content-area[data-players="5"] .player-row:nth-child(5) {
                grid-row: auto !important;
                grid-column: auto !important;
                justify-self: auto !important;
                width: auto !important;
            }

            .player-row {
                flex: 1;
                width: 100%;
                min-width: 0;
                padding: 2px;
                justify-content: center;
            }

            .visual-container { width: 100px; height: 85px; }
            .visual-box { width: 85px; }
            .visual-box svg { width: 85px; height: 85px; }
            .player-name-display { font-size: 1.1rem; width: 110px; }
            .sack-icon { width: 18px; height: 18px; }
            .btn-add-sack { font-size: 0.6rem; padding: 1px 4px; }
            .rank-badge { font-size: 0.8rem; top: 20%; right: 5px; }

            .setup-screen { justify-content: center; padding: 10px; }
            .setup-screen h2 { margin: 0 0 8px 0; font-size: 1rem; }
            .name-inputs-container {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 6px;
                max-width: 90%;
                margin-bottom: 10px;
            }
            .name-inputs-container[data-count="4"], .name-inputs-container[data-count="2"] {
                grid-template-columns: repeat(2, 1fr);
            }
            .setup-input-wrapper { padding: 4px 8px; }
            .setup-name-input { font-size: 0.95rem; }
            .btn-start-game { padding: 8px 16px; font-size: 0.85rem; }
        }

        /* Modals */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100dvh; background: rgba(0,0,0,0.4); z-index: 100; display: flex; justify-content: center; align-items: flex-start; padding-top: 15vh; opacity: 0; pointer-events: none; transition: opacity 0.15s ease; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal { background: var(--paper-color); border: 1px solid #cbd5e1; padding: 20px; width: 85%; max-width: 300px; text-align: center; border-radius: 4px; box-shadow: 5px 5px 20px rgba(0,0,0,0.2); }
        .modal h3 { margin: 0 0 10px 0; font-size: 1.2rem; text-transform: uppercase; color: var(--accent-color); }
        .modal-buttons { display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; padding: 10px; border: 1px solid #cbd5e1; background: transparent; font-family: inherit; font-weight: bold; cursor: pointer; border-radius: 3px; }
        .btn-confirm { background: var(--ink-color); color: var(--paper-color); }
    </style>
</head>
<body>

    <div class="bleckl">
        <header>
            <div class="header-top">
                <div class="action-btn" id="nameMenuBtn" onclick="toggleNameMenu()">Namen ✎</div>
                
                <div class="header-title-container">
                    <a href="../index.html" class="menu-link">☰ Såckn</a>
                </div>
                
                <div style="display: flex; gap: 6px;">
                    <div class="action-btn" id="undoBtn" onclick="undo()">⟲ Zurück</div>
                    <div class="action-btn" onclick="openResetModal()">★ Neu</div>
                </div>
            </div>
            
            <div class="setup-row">
                <span>Spieler:</span>
                <button class="count-btn" onclick="requestPlayerCountChange(2)" id="pBtn2">2</button>
                <button class="count-btn" onclick="requestPlayerCountChange(3)" id="pBtn3">3</button>
                <button class="count-btn" onclick="requestPlayerCountChange(4)" id="pBtn4">4</button>
                <button class="count-btn" onclick="requestPlayerCountChange(5)" id="pBtn5">5</button>
            </div>
        </header>

        <div id="dynamicContent" style="display: flex; flex-direction: column; flex-grow: 1; overflow: hidden;">
        </div>

        <div class="branding-footer">
            <svg viewBox="0 0 24 24" style="width: 10.5px; height: 10.5px; fill: none; stroke: currentColor; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round;">
                <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
            </svg>
            <span>luki.weiss</span>
        </div>
    </div>

    <div class="modal-overlay" id="resetModal"><div class="modal"><h3>Neues Spiel?</h3><p>Aktuelle Striche gehen verloren.</p><div class="modal-buttons"><button class="btn" onclick="closeModal('resetModal')">Nein</button><button class="btn btn-confirm" onclick="resetGame()">Ja</button></div></div></div>
    <div class="modal-overlay" id="changeCountModal"><div class="modal"><h3>Spieleranzahl ändern?</h3><p>Das aktuelle Spiel wird zurückgesetzt. Bereits vergebene Namen bleiben erhalten!</p><div class="modal-buttons"><button class="btn" onclick="closeModal('changeCountModal')">Abbrechen</button><button class="btn btn-confirm" onclick="confirmPlayerCountChange()">Ja</button></div></div></div>
    <div class="modal-overlay" id="winnerModal"><div class="modal"><h3>Spiel Vorbei!</h3><p id="winnerText"></p><button class="btn btn-confirm" style="width:100%;" onclick="closeModal('winnerModal')">Ok</button></div></div>

    <script>
        let playerCount = 4;
        let pendingPlayerCount = 4;
        let players = [];
        let historyStack = [];
        let isSetupActive = false; 
        
        let savedNamesMaster = ["", "", "", "", ""];

        function getSvgX(ticks) {
            return `
                <svg width="110" height="110" viewBox="0 0 100 100">
                    <line x1="10" y1="10" x2="90" y2="90" stroke="#a18262" stroke-width="5" stroke-linecap="round"/>
                    <line x1="90" y1="10" x2="10" y2="90" stroke="#a18262" stroke-width="5" stroke-linecap="round"/>
                    ${ticks >= 1 ? `<line x1="5" y1="28" x2="28" y2="5" stroke="#851414" stroke-width="4.5" stroke-linecap="round"/>` : ''} 
                    ${ticks >= 2 ? `<line x1="95" y1="28" x2="72" y2="5" stroke="#851414" stroke-width="4.5" stroke-linecap="round"/>` : ''} 
                    ${ticks >= 3 ? `<line x1="5" y1="72" x2="28" y2="95" stroke="#851414" stroke-width="4.5" stroke-linecap="round"/>` : ''} 
                    ${ticks >= 4 ? `<line x1="95" y1="72" x2="72" y2="95" stroke="#851414" stroke-width="4.5" stroke-linecap="round"/>` : ''} 
                    ${ticks >= 5 ? `<line x1="30" y1="50" x2="70" y2="50" stroke="#851414" stroke-width="4.5" stroke-linecap="round"/>` : ''} 
                </svg>
            `;
        }

        function getSvgSack(isCrossed) {
            if (!isCrossed) {
                return `
                    <svg class="sack-icon" viewBox="0 0 40 45">
                        <path d="M 20,4 C 17,4 17,8 15,10 C 9,14 6,22 8,32 C 10,39 16,41 20,41 C 24,41 30,39 32,32 C 34,22 31,14 25,10 C 23,8 23,4 20,4 Z" />
                        <circle cx="20" cy="7" r="2" fill="var(--ink-color)" />
                    </svg>
                `;
            } else {
                return `
                    <svg class="sack-icon crossed" viewBox="0 0 40 45">
                        <path d="M 20,4 C 17,4 17,8 15,10 C 9,14 6,22 8,32 C 10,39 16,41 20,41 C 24,41 30,39 32,32 C 34,22 31,14 25,10 C 23,8 23,4 20,4 Z" opacity="0.25" />
                        <circle cx="20" cy="7" r="2" opacity="0.25" fill="var(--ink-color)" />
                        <line x1="3" y1="24" x2="37" y2="24" stroke="#851414" stroke-width="5" stroke-linecap="round" />
                    </svg>
                `;
            }
        }

        function initApp() {
            const savedCount = localStorage.getItem('sackn_count');
            if (savedCount) playerCount = parseInt(savedCount);

            const masterNames = localStorage.getItem('sackn_master_names');
            if (masterNames) savedNamesMaster = JSON.parse(masterNames);

            const savedPlayers = localStorage.getItem('sackn_players');
            const savedSetupState = localStorage.getItem('sackn_setup_active');
            
            isSetupActive = savedSetupState === 'true';

            if (savedPlayers) {
                players = JSON.parse(savedPlayers);
                players.forEach((p, idx) => { 
                    if(idx < 5) savedNamesMaster[idx] = p.name.startsWith("Spieler ") && p.name === `Spieler ${idx+1}` ? "" : p.name; 
                });
            } else {
                generateFreshPlayers();
                isSetupActive = false; 
            }
            render();
        }

        function generateFreshPlayers() {
            players = [];
            for (let i = 0; i < playerCount; i++) {
                players.push({
                    name: savedNamesMaster[i] || `Spieler ${i + 1}`,
                    ticks: 0,
                    sacks: [],
                    finished: false,
                    rank: 0
                });
            }
        }

        function saveState() {
            historyStack.push(JSON.parse(JSON.stringify(players)));
            if (historyStack.length > 15) historyStack.shift();
            updateUndoBtn();
            saveToStorage();
        }

        function undo() {
            if (isSetupActive) return;
            if (historyStack.length > 0) {
                players = historyStack.pop();
                render();
                updateUndoBtn();
                saveToStorage();
            }
        }

        function updateUndoBtn() {
            const btn = document.getElementById('undoBtn');
            if(btn) {
                btn.classList.toggle('disabled', historyStack.length === 0 || isSetupActive);
            }
        }

        function saveToStorage() {
            localStorage.setItem('sackn_count', playerCount);
            localStorage.setItem('sackn_players', JSON.stringify(players));
            localStorage.setItem('sackn_master_names', JSON.stringify(savedNamesMaster));
            localStorage.setItem('sackn_setup_active', isSetupActive);
        }

        function requestPlayerCountChange(num) {
            if (num === playerCount && !isSetupActive) return;
            pendingPlayerCount = num;
            
            if (isSetupActive) {
                saveNamesFromInputs(); 
                playerCount = pendingPlayerCount;
                generateFreshPlayers();
                render();
                saveToStorage();
            } else {
                openModal('changeCountModal');
            }
        }

        function confirmPlayerCountChange() {
            closeModal('changeCountModal');
            saveState();
            playerCount = pendingPlayerCount;
            generateFreshPlayers();
            render();
            saveToStorage();
        }

        function toggleNameMenu() {
            if (isSetupActive) {
                saveNamesFromInputs();
                isSetupActive = false;
            } else {
                isSetupActive = true;
            }
            render();
            saveToStorage();
        }

        function saveNamesFromInputs() {
            for (let i = 0; i < playerCount; i++) {
                const input = document.getElementById(`setupName${i}`);
                if (input) {
                    let inputVal = input.value.trim();
                    savedNamesMaster[i] = inputVal; 
                    players[i].name = inputVal === "" ? `Spieler ${i + 1}` : inputVal;
                }
            }
        }

        function closeSetupAndApply() {
            saveNamesFromInputs();
            isSetupActive = false;
            render();
            saveToStorage();
        }

        function handleBoxClick(index) {
            let p = players[index];
            if (p.finished) return;

            saveState();

            if (p.ticks < 5) {
                p.ticks++;
                if (p.ticks === 5 && !p.sacks.some(s => !s.crossed)) {
                    setPlayerFinished(p);
                }
            } else {
                let openSack = p.sacks.find(s => !s.crossed);
                if (openSack) {
                    openSack.crossed = true;
                    if (!p.sacks.some(s => !s.crossed)) {
                        setPlayerFinished(p);
                    }
                }
            }
            render();
        }

        function setPlayerFinished(p) {
            let finishedCount = players.filter(pl => pl.finished).length;
            p.finished = true;
            p.rank = finishedCount + 1;
            checkGameEnd();
        }

        function addSack(index) {
            let p = players[index];
            if (p.finished) return;
            saveState();
            p.sacks.push({ crossed: false });
            
            if (p.finished) {
                p.finished = false;
                p.rank = 0;
            }
            render();
        }

        function handleSackClick(pIndex, sIndex, event) {
            event.stopPropagation();
            let p = players[pIndex];
            if (p.finished) return;
            if (p.sacks[sIndex].crossed) return;

            saveState();
            p.sacks[sIndex].crossed = true;
            
            if (p.ticks === 5 && !p.sacks.some(s => !s.crossed)) {
                setPlayerFinished(p);
            }
            render();
        }

        function checkGameEnd() {
            let active = players.filter(p => !p.finished);
            if (active.length <= 1 && players.length > 1) {
                if (active.length === 1) {
                    active[0].finished = true;
                    active[0].rank = players.length;
                }
                let rankText = [...players]
                    .sort((a,b) => a.rank - b.rank)
                    .map(p => `${p.rank}. ${p.name}`)
                    .join('<br>');
                document.getElementById('winnerText').innerHTML = rankText;
                openModal('winnerModal');
            }
        }

        function render() {
            for(let i=2; i<=5; i++) {
                document.getElementById(`pBtn${i}`).classList.toggle('active', playerCount === i);
            }

            const dynamicContent = document.getElementById('dynamicContent');
            dynamicContent.innerHTML = '';

            if (isSetupActive) {
                let setupScreen = document.createElement('div');
                setupScreen.className = 'setup-screen';
                
                let inputsHtml = '';
                for (let i = 0; i < playerCount; i++) {
                    let currentVal = savedNamesMaster[i] || "";
                    inputsHtml += `
                        <div class="setup-input-wrapper">
                            <span>${i+1}</span>
                            <input type="text" id="setupName${i}" class="setup-name-input" value="${currentVal}" placeholder="Spieler ${i+1}" autocomplete="off">
                        </div>
                    `;
                }

                setupScreen.innerHTML = `
                    <h2>Spieler benennen</h2>
                    <div class="name-inputs-container" data-count="${playerCount}">
                        ${inputsHtml}
                    </div>
                    <button class="btn-start-game" onclick="closeSetupAndApply()">Speichern</button>
                `;
                dynamicContent.appendChild(setupScreen);

            } else {
                let contentArea = document.createElement('div');
                contentArea.className = 'content-area';
                contentArea.id = 'playersContainer';
                contentArea.setAttribute('data-players', playerCount);

                players.forEach((p, index) => {
                    let row = document.createElement('div');
                    row.className = `player-row ${p.finished ? 'finished' : ''}`;

                    let sacksHtml = p.sacks.map((s, sIdx) => `
                        <div onclick="handleSackClick(${index}, ${sIdx}, event)">
                            ${getSvgSack(s.crossed)}
                        </div>
                    `).join('');

                    row.innerHTML = `
                        <div class="visual-container">
                            <div class="player-name-display">${p.name}</div>
                            <div class="visual-box" onclick="handleBoxClick(${index})">
                                ${getSvgX(p.ticks)}
                            </div>
                        </div>
                        
                        <div class="controls-container">
                            <div class="sack-container">
                                ${sacksHtml}
                            </div>
                            ${!p.finished ? `<button class="btn-add-sack" onclick="addSack(${index})">+ Sack</button>` : ''}
                        </div>
                        
                        ${p.finished ? `<div class="rank-badge">Rang ${p.rank}</div>` : ''}
                    `;
                    contentArea.appendChild(row);
                });
                dynamicContent.appendChild(contentArea);
            }
            updateUndoBtn();
        }

        function openResetModal() { openModal('resetModal'); }
        
        function resetGame() { 
            closeModal('resetModal'); 
            historyStack = []; 
            generateFreshPlayers(); 
            isSetupActive = false; 
            render(); 
            saveToStorage(); 
        }
        
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        initApp();
    </script>
</body>
</html>
